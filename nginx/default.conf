server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    charset utf-8;
    absolute_redirect off;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / {
        return 302 /landom;
    }

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /landom {
        add_header Cache-Control "no-store";
        try_files /pages/landom.html =404;
    }

    location = /landom/ {
        return 301 /landom;
    }

    location = /attune {
        add_header Cache-Control "no-store";
        try_files /pages/attune.html =404;
    }

    location = /attune/ {
        return 301 /attune;
    }

    location = /sian {
        add_header Cache-Control "no-store";
        try_files /pages/sian.html =404;
    }

    location = /sian/ {
        return 301 /sian;
    }

    location = /soom {
        add_header Cache-Control "no-store";
        try_files /pages/soom.html =404;
    }

    location = /soom/ {
        return 301 /soom;
    }

    location = /moyo {
        add_header Cache-Control "no-store";
        try_files /pages/moyo.html =404;
    }

    location = /moyo/ {
        return 301 /moyo;
    }

    location = /email-check {
        add_header Cache-Control "no-store";
        try_files /pages/email-check.html =404;
    }

    location = /email-check/ {
        return 301 /email-check;
    }

    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /pages/ {
        return 404;
    }

    location / {
        return 404;
    }
}
