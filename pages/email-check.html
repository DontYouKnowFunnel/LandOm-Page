<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Email Check — 랜딩페이지 이메일 제출 내역</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc;
    --panel: #ffffff;
    --line: #dbe3ea;
    --line-strong: #94a3b8;
    --ink: #0f172a;
    --muted: #64748b;
    --soft: #f1f5f9;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --danger: #dc2626;
    --ok: #15803d;
    --radius: 8px;
  }
  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #e2e8f0 0%, #f8fafc 42%, #f1f5f9 100%);
    color: var(--ink);
    font-family: 'Pretendard Variable', 'Pretendard', 'Noto Sans KR', system-ui, -apple-system, sans-serif;
    line-height: 1.5;
  }
  button, input, select { font: inherit; }
  button { cursor: pointer; }
  .shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 42px 0 64px; }
  .top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 20px; margin-bottom: 24px;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--accent-dark); font-size: 12px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  h1 { margin-top: 10px; font-size: clamp(30px, 4vw, 46px); line-height: 1.08; letter-spacing: -0.02em; }
  .sub { margin-top: 10px; color: var(--muted); font-size: 15px; max-width: 680px; }
  .badge {
    display: inline-flex; align-items: center; min-height: 30px; padding: 0 10px;
    border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,0.74);
    color: var(--muted); font-size: 12px; font-weight: 800; white-space: nowrap;
  }
  .panel {
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
  }
  .controls {
    display: grid;
    grid-template-columns: minmax(240px, 1fr) 180px 130px auto;
    gap: 10px;
    padding: 16px;
    align-items: end;
  }
  label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  input, select {
    height: 42px; border: 1px solid var(--line-strong); border-radius: var(--radius);
    background: #fff; color: var(--ink); padding: 0 12px;
  }
  input:focus, select:focus { outline: 2px solid rgba(37, 99, 235, 0.22); border-color: var(--accent); }
  .btn {
    height: 42px; border: 1px solid var(--accent); border-radius: var(--radius);
    background: var(--accent); color: #fff; padding: 0 16px; font-weight: 900;
  }
  .btn:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn.secondary { background: #fff; color: var(--ink); border-color: var(--line-strong); }
  .btn.secondary:hover { background: var(--soft); border-color: var(--muted); }
  .status {
    min-height: 24px; padding: 0 16px 14px;
    color: var(--muted); font-size: 13px;
  }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--ok); }
  .summary {
    display: flex; gap: 10px; flex-wrap: wrap;
    padding: 14px 16px; border-top: 1px solid var(--line); background: var(--soft);
  }
  .summary span {
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 28px; padding: 0 10px; border: 1px solid var(--line);
    border-radius: 999px; background: #fff; color: var(--muted); font-size: 12px; font-weight: 800;
  }
  .table-wrap { overflow: auto; border-top: 1px solid var(--line); }
  table { width: 100%; min-width: 860px; border-collapse: collapse; background: #fff; }
  th, td { padding: 13px 16px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
  th {
    position: sticky; top: 0; z-index: 1;
    background: #f8fafc; color: var(--muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  td { font-size: 14px; }
  tr:hover td { background: #f8fbff; }
  .service {
    display: inline-flex; min-height: 24px; align-items: center;
    border-radius: 999px; padding: 0 9px; font-size: 12px; font-weight: 900;
    background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
    text-transform: capitalize;
  }
  .email { font-weight: 850; white-space: nowrap; }
  .path { color: var(--ink); font-weight: 700; }
  .source { margin-top: 3px; color: var(--muted); font-size: 12px; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { padding: 42px 16px; text-align: center; color: var(--muted); background: #fff; }
  .footnote { margin-top: 14px; color: var(--muted); font-size: 12px; }
  @media (max-width: 820px) {
    .top { flex-direction: column; }
    .controls { grid-template-columns: 1fr; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<main class="shell">
  <div class="top">
    <div>
      <span class="eyebrow"><span class="dot"></span> Admin · Email Leads</span>
      <h1>이메일 제출 내역</h1>
      <p class="sub">API key에 `LEADS_ADMIN_TOKEN` 값을 입력하면 랜딩페이지별 이메일 제출 시간과 유입 페이지를 확인할 수 있습니다.</p>
    </div>
    <span class="badge">/email-check</span>
  </div>

  <section class="panel">
    <form class="controls" id="lead-form">
      <label>
        API key
        <input id="admin-token" type="password" autocomplete="current-password" placeholder="LEADS_ADMIN_TOKEN" required />
      </label>
      <label>
        Page
        <select id="service-filter">
          <option value="">전체</option>
          <option value="landom">LandOm</option>
          <option value="attune">Attune</option>
          <option value="sian">Sian</option>
          <option value="soom">SOOM</option>
          <option value="moyo">MOYO</option>
        </select>
      </label>
      <label>
        Limit
        <select id="limit">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="250">250</option>
          <option value="500">500</option>
        </select>
      </label>
      <div style="display: flex; gap: 8px;">
        <button class="btn" type="submit">조회</button>
        <button class="btn secondary" type="button" id="clear-token">초기화</button>
      </div>
    </form>
    <p class="status" id="status">API key를 입력하고 조회를 누르세요.</p>
    <div class="summary" id="summary" hidden></div>
    <div class="table-wrap" id="table-wrap" hidden>
      <table>
        <thead>
          <tr>
            <th>제출 시간</th>
            <th>이메일</th>
            <th>페이지</th>
            <th>유입 경로</th>
            <th>CTA</th>
          </tr>
        </thead>
        <tbody id="lead-rows"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" hidden>아직 표시할 이메일 제출 내역이 없습니다.</div>
  </section>
  <p class="footnote">API key는 현재 브라우저 탭의 sessionStorage에만 저장됩니다.</p>
</main>

<script>
(() => {
  const form = document.getElementById("lead-form");
  const tokenInput = document.getElementById("admin-token");
  const serviceFilter = document.getElementById("service-filter");
  const limitInput = document.getElementById("limit");
  const clearButton = document.getElementById("clear-token");
  const statusEl = document.getElementById("status");
  const summaryEl = document.getElementById("summary");
  const tableWrap = document.getElementById("table-wrap");
  const rowsEl = document.getElementById("lead-rows");
  const emptyEl = document.getElementById("empty");
  const tokenKey = "emailCheckAdminToken";

  tokenInput.value = sessionStorage.getItem(tokenKey) || "";

  function setStatus(message, tone) {
    statusEl.textContent = message;
    statusEl.className = `status ${tone || ""}`.trim();
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatDate(value) {
    if (!value) return "-";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;
    return new Intl.DateTimeFormat("ko-KR", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    }).format(date);
  }

  function updateSummary(leads) {
    const counts = leads.reduce((acc, lead) => {
      acc[lead.service] = (acc[lead.service] || 0) + 1;
      return acc;
    }, {});
    const parts = [`<span>총 ${leads.length}건</span>`].concat(
      Object.entries(counts)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([service, count]) => `<span>${escapeHtml(service)} · ${count}건</span>`)
    );
    summaryEl.innerHTML = parts.join("");
    summaryEl.hidden = false;
  }

  function renderRows(leads) {
    rowsEl.innerHTML = leads.map((lead) => {
      const pagePath = lead.page_path || "-";
      const sourceUrl = lead.source_url || "";
      return `
        <tr>
          <td>${escapeHtml(formatDate(lead.created_at))}</td>
          <td class="email">${escapeHtml(lead.email)}</td>
          <td><span class="service">${escapeHtml(lead.service)}</span></td>
          <td>
            <div class="path">${escapeHtml(pagePath)}</div>
            ${sourceUrl ? `<div class="source" title="${escapeHtml(sourceUrl)}">${escapeHtml(sourceUrl)}</div>` : ""}
          </td>
          <td>${escapeHtml(lead.cta_id || "-")}</td>
        </tr>
      `;
    }).join("");
  }

  async function fetchLeads() {
    const token = tokenInput.value.trim();
    if (!token) {
      setStatus("API key를 입력해 주세요.", "error");
      return;
    }

    sessionStorage.setItem(tokenKey, token);
    const params = new URLSearchParams({ limit: limitInput.value });
    if (serviceFilter.value) params.set("service", serviceFilter.value);

    setStatus("이메일 제출 내역을 불러오는 중입니다...");
    tableWrap.hidden = true;
    emptyEl.hidden = true;
    summaryEl.hidden = true;

    try {
      const response = await fetch(`/api/leads?${params.toString()}`, {
        headers: { "X-Admin-Token": token }
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(result.detail || "조회에 실패했습니다.");
      }

      const leads = Array.isArray(result.leads) ? result.leads : [];
      updateSummary(leads);
      if (!leads.length) {
        setStatus("조회는 성공했지만 표시할 내역이 없습니다.", "ok");
        emptyEl.hidden = false;
        return;
      }

      renderRows(leads);
      tableWrap.hidden = false;
      setStatus(`최근 ${leads.length}건을 불러왔습니다.`, "ok");
    } catch (error) {
      setStatus(error.message || "잠시 후 다시 시도해 주세요.", "error");
    }
  }

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    fetchLeads();
  });

  clearButton.addEventListener("click", () => {
    sessionStorage.removeItem(tokenKey);
    tokenInput.value = "";
    rowsEl.innerHTML = "";
    tableWrap.hidden = true;
    emptyEl.hidden = true;
    summaryEl.hidden = true;
    setStatus("저장된 API key를 지웠습니다.");
  });

  if (tokenInput.value) fetchLeads();
})();
</script>
</body>
</html>
